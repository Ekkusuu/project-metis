services:
  llm_service:
    build:
      context: .
      dockerfile: backend/llm_service/Dockerfile
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./model:/app/model:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      llm_service:
        condition: service_healthy
    environment:
      METIS_LLM_SERVICE_HOST: llm_service
      METIS_LLM_SERVICE_PORT: 3000
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./model:/app/model:ro
      - ./rag-models:/app/rag-models:ro
      - ./memory:/app/memory
      - ./.chromadb:/app/.chromadb
      - ./docs:/app/docs:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
