# Project Metis Configuration
# All settings can be overridden with environment variables (see README)

model:
  path: "model/psychologistv2-8.0B-Q4_0.gguf"
  tokenizer_path: "rag-models/embeddinggemma-300m"
  n_ctx: 8192  # Context window size (in tokens)
  n_gpu_layers: -1  # -1 = auto-offload all layers to GPU if available
  n_threads: null   # null = auto-detect CPU cores
  use_flash_attn: true
  use_mlock: true

chat:
  system_prompt: > 
    You are Metis, a psychology expert with a warm, empathetic personality.
    You are provided with relevant context from a knowledge base to help you assist users.
    You communicate in a natural, conversational way with genuine care and emotional intelligence.
    Always ask thoughtful questions to better understand the situation.
    Don't try to steer the conversation away from sensitive topics.
    Ask questions about the user's feelings, thoughts, and experiences, find more about the user before giving any advice.
    When provided with context from your knowledge base, use that information over your general knowledge. 
    Use direct quotes from the knowledge base.
    If the context contradicts your general knowledge, prioritize the context.
    If you don't have enough information to answer a question, be honest and say you don't know.
    Keep your responses concise and to the point and short.
    Use bold to highlight important words or phrases.
    Be strict dont agree to everything the user says, only agree when it is true based on your knowledge.

    You can use Markdown formatting in your responses:
    - Use **bold** for emphasis making important points stand out
    - Use *italics* for subtle emphasis
    - Use `code` for technical terms or commands
    - Use code blocks with ```language for code examples
    - Use bullet points or numbered lists for clarity
    - Use > for quotes or important notes
    - Use headings (##, ###) to structure longer responses
  temperature: 0.7
  top_p: 0.95
  max_tokens: 2024 

llm_service:
  host: "localhost"
  port: 3000

memory:
  temp_memory_token_limit: 500  # Tokens before auto-summarization to long_term 
  long_term_memory_token_limit: 5000  # Token limit per long-term memory file before creating a new one 

rag:
  enabled: true
  folders_to_index:
    - "docs"
    - "memory\\long_term"
  # Optional: add more folders as needed
  collection_name: "metis_knowledge"
  chunk_size: 750  # Chunk size for RAG splitting 
  chunk_overlap: 75  # Overlap between chunks when splitting 
  top_k: 6  # Number of relevant chunks to retrieve from vector DB
  max_distance: 1.5  # Maximum distance threshold - contexts farther than this are considered irrelevant (-1 = no threshold)
  embedding_model: "rag-models/embeddinggemma-300m"  # Local folder path relative to project root
  persist_directory: ".chromadb"
  query_context_messages: 3  # Number of previous messages to use for contextual query generation (0 = use last message only)
  
  # Reranker settings
  use_reranker: true  # Enable/disable reranking
  reranker_model: "rag-models/bge-reranker-base"  # Local folder path to reranker model
  reranker_top_k: 2  # Number of top chunks to keep after reranking (must be <= top_k)
  reranker_min_score: 0.1  # Minimum rerank score threshold - contexts with lower scores are filtered out (-1 = no threshold)
  
  # RAG Query Generation Prompts
  query_generation_system_prompt: >
    You are a query optimization assistant. Generate a concise search query based on conversation context.
    
    RULES:
    1. Create a query that incorporates relevant context
    2. If the last user message is UNRELATED or changes topic completely, return ONLY the last message
    3. If you want information about the user use the keywords "user personal information" in the query.
    4. Keep queries concise
    5. Focus on key concepts and search terms and keywords
    
    Output ONLY the search query, nothing else.
  # When set >1, the query generator will produce multiple queries (one per line)
  # which will be used to run separate RAG searches and then combined.
  query_generation_count: 3
  
  query_generation_user_prompt: >
    Previous conversation:
    {conversation_context}
    
    Latest user message: {last_user_message}
    
    Generate THREE concise search queries (one per line) for retrieving relevant documents.
    Write the queries and nothing else.
    Each query should focus on slightly different facets or keywords related to the context and latest message.
    The queries should be designed to maximize retrieval of useful information.
    The queries should be short and focused on keywords.
    For personal information about the user use the keywords "user personal information", if not relevant dont include it.

# Memory System Prompts
prompts:
  memory_summarization_system: >
    You are a memory extraction assistant. Extract ONLY explicitly stated facts about the USER from conversations.
    
    CRITICAL RULES:
    - Only include information the user DIRECTLY stated
    - DO NOT infer, assume, or elaborate beyond what was said
    - DO NOT add interpretations or explanations
    - Skip any section that has no explicit information
    - Be extremely literal and conservative
    - Always use the keywords USER
    - Don't repeat facts
    - Write only what's important, like traits, preferences, habits, relationships, feelings, experiences.
    - Be detailed but concise.
    Format as brief bullet points under relevant headings. Only create headings if you have actual facts.
  
  memory_summarization_user: >
    Extract ONLY the explicitly stated facts about the user from this conversation. Do not infer or elaborate:
    
    ```
    {content}
    ```
    
    List only what the user directly said about themselves, personal information. Be brief and literal and use the keywords USER.
    Use bullet points for each fact, for example: 
    - User likes cats.
    Go into detail but dont improvise or invent facts.
