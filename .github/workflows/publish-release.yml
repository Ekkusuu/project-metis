name: Publish Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string
      latest:
        description: Also push latest tags
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: project-metis-backend
  LLM_IMAGE: project-metis-llm-service
  TORCH_INDEX_URL: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine release tag
        id: vars
        shell: bash
        run: |
          OWNER_LOWER=$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          if [ "${{ github.event_name }}" = "release" ] || [ "${{ inputs.latest }}" = "true" ]; then
            BACKEND_TAGS="${REGISTRY}/${OWNER_LOWER}/${BACKEND_IMAGE}:${TAG}\n${REGISTRY}/${OWNER_LOWER}/${BACKEND_IMAGE}:latest"
            LLM_TAGS="${REGISTRY}/${OWNER_LOWER}/${LLM_IMAGE}:${TAG}\n${REGISTRY}/${OWNER_LOWER}/${LLM_IMAGE}:latest"
          else
            BACKEND_TAGS="${REGISTRY}/${OWNER_LOWER}/${BACKEND_IMAGE}:${TAG}"
            LLM_TAGS="${REGISTRY}/${OWNER_LOWER}/${LLM_IMAGE}:${TAG}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "owner_lower=${OWNER_LOWER}" >> "$GITHUB_OUTPUT"
          echo "backend_ref=${REGISTRY}/${OWNER_LOWER}/${BACKEND_IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "llm_ref=${REGISTRY}/${OWNER_LOWER}/${LLM_IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          {
            echo 'backend_tags<<EOF'
            printf '%b\n' "$BACKEND_TAGS"
            echo 'EOF'
            echo 'llm_tags<<EOF'
            printf '%b\n' "$LLM_TAGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            TORCH_INDEX_URL=${{ env.TORCH_INDEX_URL }}
          tags: ${{ steps.vars.outputs.backend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push llm image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/llm_service/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.vars.outputs.llm_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release bundle
        run: |
          python generate_release_bundle.py \
            --tag "${{ steps.vars.outputs.tag }}" \
            --backend-ref "${{ steps.vars.outputs.backend_ref }}" \
            --llm-ref "${{ steps.vars.outputs.llm_ref }}"

      - name: Ensure release exists for manual runs
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.vars.outputs.tag }}" >/dev/null 2>&1 || \
          gh release create "${{ steps.vars.outputs.tag }}" --title "${{ steps.vars.outputs.tag }}" --notes "Docker release ${{ steps.vars.outputs.tag }}"

      - name: Upload release bundle asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.vars.outputs.tag }}" \
            ".release/${{ steps.vars.outputs.tag }}/project-metis-release.zip" \
            --clobber
